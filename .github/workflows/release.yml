name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write       # create GitHub releases and tags
  issues: write         # comment on issues when they are released
  pull-requests: write  # comment on PRs when they are released
  id-token: write       # OIDC token for npm provenance

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # semantic-release needs the full git history to determine the
          # correct next version from all commits since the last tag.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
